server:
  port: 8080

spring:
  application:
    name: oh-my-blog
  profiles:
    active: dev

  # Jackson 全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # 日志输出（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 下划线转驼峰
    map-underscore-to-camel-case: true
  # Mapper XML 路径
  mapper-locations: classpath:mapper/*.xml
  # 实体扫描路径
  type-aliases-package: com.portfolio.entity
  global-config:
    db-config:
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: oh-my-blog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24小时（毫秒）

# 日志
logging:
  level:
    com.portfolio: debug
    org.springframework.security: debug
