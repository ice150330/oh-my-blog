spring:
  # MySQL（本地开发）
  datasource:
    url: jdbc:mysql://localhost:3306/oh_my_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis（Memurai on Windows）
  data:
    redis:
      host: localhost
      port: 6379
      # Memurai 默认无密码
      password:
      connect-timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 开发环境初始化脚本
  sql:
    init:
      mode: never  # 手动执行 init.sql

# 详细日志
logging:
  level:
    com.portfolio: debug
