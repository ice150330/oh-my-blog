<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- ============================================================
       Icon Sprite — unified bold-round style
       stroke-width: 2.5, stroke-linecap: round, stroke-linejoin: round
       ============================================================ -->

  <defs>
    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arrows -->
  <symbol id="arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
